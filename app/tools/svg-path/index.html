<section class="converter tool-content" data-svg-converter>
    <div class="converter-input">
        <div class="field-heading">
            <label for="svg-input">Source SVG</label>
            <label class="file-button" for="svg-file">Choose file</label>
            <input class="visually-hidden-file" id="svg-file" type="file" accept="image/svg+xml,.svg">
        </div>
        <textarea id="svg-input" spellcheck="false" aria-describedby="input-help"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <polygon points="12,2 22,20 2,20" fill="none" stroke="currentColor" />
</svg></textarea>
        <p id="input-help" class="field-help">Processing stays in this browser. Existing path elements are preserved.</p>
    </div>

    <div class="converter-actions">
        <button class="button button-primary" type="button" data-convert>Convert shapes</button>
        <span class="conversion-status status-text" role="status" aria-live="polite" data-status>Ready</span>
    </div>

    <div class="converter-output">
        <div class="field-heading">
            <label for="svg-output">Converted SVG</label>
            <div class="output-actions">
                <button class="text-button" type="button" data-copy disabled>Copy</button>
                <button class="text-button" type="button" data-download disabled>Download</button>
            </div>
        </div>
        <textarea id="svg-output" spellcheck="false" readonly aria-describedby="output-help"></textarea>
        <p id="output-help" class="field-help">Transforms and presentation attributes remain on the converted elements.</p>
    </div>
</section>
