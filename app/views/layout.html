<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>{{ @pageTitle }}</title>
    <link rel="icon" type="image/png" href="/assets/logo/favicon.png?v={{ @ASSET_VERSION }}">
    <link rel="stylesheet" href="/assets/app.css?v={{ @ASSET_VERSION }}">
    <check if="{{ @TOOL_CSS }}">
        <link rel="stylesheet" href="{{ @TOOL_CSS }}">
    </check>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/" aria-label="Toolbox home">
            <img class="brand-logo" src="/assets/logo/landscape_dark_small.svg?v={{ @ASSET_VERSION }}" width="132" height="34" alt="">
        </a>
        <check if="{{ @TOOL_PAGE }}">
            <h1 class="tool-context" aria-label="{{ @TOOL.title }}">
                <span class="tool-context-shorthand">/{{ @TOOL.shorthand }}</span>
                <span class="tool-context-separator" aria-hidden="true">:</span>
                <span class="tool-context-title">{{ @TOOL.title }}</span>
            </h1>
        </check>
    </header>
    <main>
        <check if="{{ @TOOL_PAGE }}">
            <div class="tool-heading">
                <p>{{ @TOOL.description }}</p>
            </div>
        </check>
        <include href="{{ @content }}" />
    </main>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <span>&copy; {{ @CURRENT_YEAR }} by <a href="https://sorkos.net">sorkos.net</a></span>
        </div>
    </footer>
    <check if="{{ @TOOL_JS }}">
        <script src="{{ @TOOL_JS }}" defer></script>
    </check>
</body>
</html>
